name: e2e

on:
  repository_dispatch:
    types:
      - vercel.deployment.success
  workflow_dispatch:
    inputs:
      base_url:
        description: "Vercel preview URL"
        required: true
      ref:
        description: "Git ref to test"
        required: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ github.event.inputs.base_url || github.event.client_payload.deployment_url || github.event.client_payload.url || github.event.client_payload.deploymentUrl || github.event.client_payload.target_url }}
      CHECKOUT_REF: main
      CONVEX_URL: ${{ secrets.PREVIEW_DATA_CONVEX_URL }}
      NEXT_PUBLIC_DEFAULT_LESSON_ID: k170tmrc8zxxqtabctyddvhhqx7zkgae
      NIOTEBOOK_INGEST_TOKEN: ${{ secrets.NIOTEBOOK_INGEST_TOKEN_PREVIEW_DATA }}
      NIOTEBOOK_E2E_VIDEO_ID: ${{ secrets.NIOTEBOOK_E2E_VIDEO_ID }}
      E2E_USE_WEBSERVER: "false"
      NIOTEBOOK_E2E_SEED_PATH: .e2e-seed.json
    steps:
      - name: Resolve checkout ref
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          event_path = os.environ.get("GITHUB_EVENT_PATH")
          with open(event_path, "r", encoding="utf-8") as handle:
              event = json.load(handle)

          inputs = event.get("inputs", {}) or {}
          client_payload = event.get("client_payload", {}) or {}
          deployment = client_payload.get("deployment", {}) or {}

          def pick(*values):
              for value in values:
                  if value:
                      return value
              return None

          meta = deployment.get("meta", {}) or {}
          git_source = deployment.get("gitSource", {}) or {}

          def resolve_ref(source):
              if not isinstance(source, dict):
                  return None
              meta = source.get("meta", {}) or {}
              git_source = source.get("gitSource", {}) or {}
              return pick(
                meta.get("githubCommitSha"),
                meta.get("githubCommitRef"),
                meta.get("gitSha"),
                meta.get("gitRef"),
                source.get("sha"),
                git_source.get("sha"),
                git_source.get("ref"),
              )

          ref = pick(
            inputs.get("ref"),
            meta.get("githubCommitSha"),
            meta.get("githubCommitRef"),
            meta.get("gitSha"),
            meta.get("gitRef"),
            deployment.get("sha"),
            git_source.get("sha"),
            git_source.get("ref"),
            client_payload.get("ref"),
          )

          base_url = pick(
              inputs.get("base_url"),
              deployment.get("url"),
              client_payload.get("deployment_url"),
              client_payload.get("deploymentUrl"),
              client_payload.get("target_url"),
              client_payload.get("url"),
          )

          def normalize_url(value):
              if not value:
                  return None
              normalized = value.strip()
              if normalized.startswith("http"):
                  normalized = normalized.split("//", 1)[1]
              normalized = normalized.strip("/")
              return normalized or None

          normalized = normalize_url(base_url)
          deployment_id = pick(
              deployment.get("id"),
              client_payload.get("deploymentId"),
              client_payload.get("deployment_id"),
          )

          if not ref and os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch":
              ref = os.environ.get("GITHUB_SHA")

          if not ref:
              ref = os.environ.get("CHECKOUT_REF") or "main"
              print(
                  "Unable to resolve git ref from payload; "
                  f"defaulting to {ref}."
              )

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"CHECKOUT_REF={ref}\n")
              if normalized:
                  handle.write(f"BASE_URL=https://{normalized}\n")
                  handle.write(f"BASE_URL_CLEAN={normalized}\n")
              if deployment_id:
                  handle.write(f"VERCEL_DEPLOYMENT_ID={deployment_id}\n")

          print(f"Payload inputs.ref: {inputs.get('ref')}")
          print(f"Payload inputs.base_url: {inputs.get('base_url')}")
          print(f"Payload client_payload.ref: {client_payload.get('ref')}")
          print(f"Payload client_payload.deployment_url: {client_payload.get('deployment_url')}")
          print(f"Payload client_payload.deploymentUrl: {client_payload.get('deploymentUrl')}")
          print(f"Payload client_payload.target_url: {client_payload.get('target_url')}")
          print(f"Payload client_payload.url: {client_payload.get('url')}")
          print(f"Payload deployment.url: {deployment.get('url')}")
          print(f"Payload deployment.id: {deployment_id}")
          print(f"Payload meta.githubCommitSha: {meta.get('githubCommitSha')}")
          print(f"Payload meta.githubCommitRef: {meta.get('githubCommitRef')}")
          print(f"Payload meta.gitSha: {meta.get('gitSha')}")
          print(f"Payload meta.gitRef: {meta.get('gitRef')}")
          print(f"Payload gitSource.sha: {git_source.get('sha')}")
          print(f"Payload gitSource.ref: {git_source.get('ref')}")
          print(f"Resolved checkout ref: {ref}")
          if base_url:
              print(f"Resolved base URL: {base_url}")
          if normalized:
              print(f"Resolved base URL clean: {normalized}")
          if deployment_id:
              print(f"Payload deployment.id: {deployment_id}")
          PY
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.19"
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps
      - name: E2E diagnostics
        run: |
          echo "Trigger: ${{ github.event_name }}"
          echo "Resolved CHECKOUT_REF: ${{ env.CHECKOUT_REF }}"
          echo "Resolved BASE_URL: ${{ env.BASE_URL }}"
          echo "Resolved BASE_URL_CLEAN: ${{ env.BASE_URL_CLEAN }}"
      - name: Validate BASE_URL
        run: |
          if [ -z "${BASE_URL}" ]; then
            echo "BASE_URL is empty. Provide base_url or ensure repository_dispatch payload includes a deployment URL."
            exit 1
          fi
      - run: bun run e2e:seed
      - run: bun ./scripts/e2eEnv.ts --github
      - run: bun run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: playwright-results
          path: |
            test-results/**
            playwright-report/**
