name: e2e

on:
  repository_dispatch:
    types:
      - vercel.deployment.success
  workflow_dispatch:
    inputs:
      base_url:
        description: "Vercel preview URL"
        required: true
      ref:
        description: "Git ref to test"
        required: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ github.event.inputs.base_url || github.event.client_payload.deployment_url }}
      CHECKOUT_REF: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_PREVIEW_DEPLOY_KEY }}
      CONVEX_DEPLOYMENT: ${{ secrets.CONVEX_DEPLOYMENT }}
      NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
      CONVEX_PREVIEW_NAME: e2e
      NIOTEBOOK_E2E_SEED_PATH: .e2e-seed.json
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.19"
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps
      - run: bun run e2e:convex:push
      - run: bun run e2e:seed
      - run: bun ./scripts/e2eEnv.ts --github
      - run: bun run test:e2e
