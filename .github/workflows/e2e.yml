name: e2e

# Triggers:
#   1. deployment_status — fires when Vercel updates a GitHub deployment status.
#      Runs only on successful preview deployments (not production).
#      Provides BASE_URL and commit SHA automatically — no payload parsing needed.
#   2. workflow_dispatch — manual runs with explicit base_url and ref inputs.
on:
  deployment_status:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Vercel preview URL (e.g. https://niotebook-xyz.vercel.app)"
        required: true
      ref:
        description: "Git ref to checkout (commit SHA or branch)"
        required: true

env:
  BUN_VERSION: "1.1.19"
  NEXT_PUBLIC_DEFAULT_LESSON_ID: k170tmrc8zxxqtabctyddvhhqx7zkgae

jobs:
  # Lightweight preflight job: verify the deployment is an e2e-ready preview.
  # The e2e job only runs if this job sets outputs.ready=true.
  preflight:
    # Filter to Vercel deployments only — other GitHub Apps also fire deployment_status.
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'deployment_status' &&
       github.event.deployment_status.state == 'success' &&
       github.event.deployment.environment != 'Production' &&
       contains(github.event.deployment_status.target_url, '.vercel.app'))
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
      base_url: ${{ steps.check.outputs.base_url }}
      checkout_ref: ${{ steps.check.outputs.checkout_ref }}
    steps:
      - name: Resolve inputs and check e2e marker
        id: check
        env:
          # deployment_status provides URL and SHA directly — no payload parsing
          DS_URL: ${{ github.event.deployment_status.target_url }}
          DS_REF: ${{ github.event.deployment.sha }}
          WD_URL: ${{ github.event.inputs.base_url }}
          WD_REF: ${{ github.event.inputs.ref }}
        run: |
          BASE_URL="${DS_URL:-$WD_URL}"
          CHECKOUT_REF="${DS_REF:-$WD_REF}"

          # Validate required values before writing any outputs
          if [ -z "${BASE_URL}" ]; then
            echo "BASE_URL is empty — aborting."
            exit 1
          fi

          if [ -z "${CHECKOUT_REF}" ]; then
            echo "CHECKOUT_REF is empty — aborting."
            exit 1
          fi

          echo "Trigger: $GITHUB_EVENT_NAME"
          echo "Base URL: ${BASE_URL}"
          echo "Checkout ref: ${CHECKOUT_REF}"

          # Use multiline delimiter syntax to prevent newline injection in GITHUB_OUTPUT
          {
            echo "base_url<<_EOL_"
            echo "${BASE_URL}"
            echo "_EOL_"
            echo "checkout_ref<<_EOL_"
            echo "${CHECKOUT_REF}"
            echo "_EOL_"
          } >> "$GITHUB_OUTPUT"

          # Distinguish infra errors (hard fail) from marker-missing (soft skip).
          # Capture curl separately so a DNS failure / timeout / 4xx fails the job
          # rather than silently producing ready=false.
          HTTP_BODY=$(curl -sf --max-time 15 "${BASE_URL}" 2>/tmp/curl_err)
          CURL_EXIT=$?
          if [ $CURL_EXIT -ne 0 ]; then
            echo "Preflight fetch failed (curl exit ${CURL_EXIT}): $(cat /tmp/curl_err)"
            echo "This is an infrastructure error — failing hard to surface the problem."
            exit 1
          fi

          if echo "${HTTP_BODY}" | grep -q 'name="niotebook-e2e" content="ready"'; then
            echo "E2E marker present — proceeding."
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "E2E marker missing — deployment not ready for e2e."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

  e2e:
    needs: preflight
    if: needs.preflight.outputs.ready == 'true'
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ needs.preflight.outputs.base_url }}
      CONVEX_URL: ${{ secrets.PREVIEW_DATA_CONVEX_URL }}
      NIOTEBOOK_INGEST_TOKEN: ${{ secrets.NIOTEBOOK_INGEST_TOKEN_PREVIEW_DATA }}
      NIOTEBOOK_E2E_VIDEO_ID: ${{ secrets.NIOTEBOOK_E2E_VIDEO_ID }}
      NIOTEBOOK_E2E_SEED_PATH: .e2e-seed.json
      E2E_USE_WEBSERVER: "false"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.checkout_ref }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-${{ runner.os }}-
      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
      - run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps
      - run: bun run e2e:seed
      - run: bun ./scripts/e2eEnv.ts --github
      - run: bun run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: |
            test-results/**
            playwright-report/**
