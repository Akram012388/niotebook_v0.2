name: e2e

on:
  repository_dispatch:
    types:
      - vercel.deployment.success
  workflow_dispatch:
    inputs:
      base_url:
        description: "Vercel preview URL"
        required: true
      ref:
        description: "Git ref to test"
        required: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ github.event.inputs.base_url || github.event.client_payload.deployment_url || github.event.client_payload.url || github.event.client_payload.deploymentUrl || github.event.client_payload.target_url }}
      CHECKOUT_REF: ${{ github.event.inputs.ref || github.event.client_payload.deployment.meta.githubCommitSha || github.event.client_payload.deployment.meta.githubCommitRef || github.event.client_payload.ref || 'main' }}
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_PREVIEW_DEPLOY_KEY }}
      CONVEX_DEPLOYMENT: ${{ secrets.CONVEX_DEPLOYMENT }}
      NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
      NIOTEBOOK_E2E_VIDEO_ID: ${{ secrets.NIOTEBOOK_E2E_VIDEO_ID }}
      CONVEX_PREVIEW_NAME: e2e
      E2E_USE_WEBSERVER: "false"
      NIOTEBOOK_E2E_SEED_PATH: .e2e-seed.json
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
      VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_E2E_ALIAS: ${{ secrets.VERCEL_E2E_ALIAS }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.19"
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps
      - name: E2E diagnostics
        run: |
          echo "Trigger: ${{ github.event_name }}"
          echo "Resolved BASE_URL: ${{ env.BASE_URL }}"
      - name: Validate BASE_URL
        run: |
          if [ -z "${BASE_URL}" ]; then
            echo "BASE_URL is empty. Provide base_url or ensure repository_dispatch payload includes a deployment URL."
            exit 1
          fi
      - name: Deploy Convex preview
        run: |
          set -euo pipefail
          output=$(bun run e2e:convex:push 2>&1)
          echo "$output"
          export CONVEX_DEPLOY_OUTPUT="$output"
          convex_url=$(python - <<'PY'
          import os, re
          output = os.environ.get("CONVEX_DEPLOY_OUTPUT", "")
          match = re.search(r"https://[a-z0-9-]+\.convex\.cloud", output)
          print(match.group(0) if match else "")
          PY
          )
          if [ -z "$convex_url" ]; then
            echo "Convex preview URL not found in deploy output"
            exit 1
          fi
          echo "E2E_CONVEX_URL=$convex_url" >> $GITHUB_ENV
      - name: Update Vercel preview env
        if: ${{ env.E2E_CONVEX_URL && env.VERCEL_API_TOKEN && env.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          payload=$(cat <<JSON
          {"key":"NEXT_PUBLIC_CONVEX_URL","value":"${E2E_CONVEX_URL}","type":"encrypted","target":["preview"]}
          JSON
          )
          curl -sS -X POST "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env?upsert=true" \
            -H "Authorization: Bearer ${VERCEL_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$payload"
          payload=$(cat <<JSON
          {"key":"CONVEX_DEPLOYMENT","value":"${CONVEX_PREVIEW_NAME}","type":"encrypted","target":["preview"]}
          JSON
          )
          curl -sS -X POST "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env?upsert=true" \
            -H "Authorization: Bearer ${VERCEL_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$payload"
      - name: Redeploy Vercel preview
        if: ${{ env.BASE_URL && env.VERCEL_API_TOKEN && env.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          response=$(curl -sS -H "Authorization: Bearer ${VERCEL_API_TOKEN}" \
            "https://api.vercel.com/v13/deployments?projectId=${VERCEL_PROJECT_ID}&limit=20")
          deployment_id=$(python -c 'import json,os,sys; data=json.loads(sys.stdin.read()); base=os.environ.get("BASE_URL_CLEAN", ""); print(next((d.get("id", "") for d in data.get("deployments", []) if d.get("url") == base), ""))' <<< "$response")
          if [ -z "$deployment_id" ]; then
            echo "Deployment ID not found for ${BASE_URL_CLEAN}"
            exit 1
          fi
          redeploy=$(curl -sS -X POST "https://api.vercel.com/v13/deployments/${deployment_id}/redeploy" \
            -H "Authorization: Bearer ${VERCEL_API_TOKEN}")
          new_url=$(python -c 'import json,sys; data=json.loads(sys.stdin.read() or "{}"); print(data.get("url", ""))' <<< "$redeploy")
          new_id=$(python -c 'import json,sys; data=json.loads(sys.stdin.read() or "{}"); print(data.get("id", ""))' <<< "$redeploy")
          if [ -z "$new_url" ] || [ -z "$new_id" ]; then
            echo "Redeploy response missing url or id"
            echo "$redeploy"
            exit 1
          fi
          if [ -n "${VERCEL_E2E_ALIAS:-}" ]; then
            alias_payload=$(printf '{"alias":"%s"}' "$VERCEL_E2E_ALIAS")
            curl -sS -X POST "https://api.vercel.com/v13/deployments/${new_id}/aliases" \
              -H "Authorization: Bearer ${VERCEL_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$alias_payload"
            echo "BASE_URL=https://${VERCEL_E2E_ALIAS}" >> $GITHUB_ENV
          else
            echo "BASE_URL=https://${new_url}" >> $GITHUB_ENV
          fi
        env:
          BASE_URL_CLEAN: ${{ env.BASE_URL }}
          VERCEL_E2E_ALIAS: ${{ secrets.VERCEL_E2E_ALIAS }}
      - run: bun run e2e:seed
      - run: bun ./scripts/e2eEnv.ts --github
      - run: echo "BASE_URL=${BASE_URL}?lessonId=${NEXT_PUBLIC_DEFAULT_LESSON_ID}" >> $GITHUB_ENV
      - run: bun run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: playwright-results
          path: |
            test-results/**
            playwright-report/**
