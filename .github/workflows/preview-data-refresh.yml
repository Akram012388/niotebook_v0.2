name: preview-data refresh

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  refresh:
    uses: ./.github/workflows/_refresh-convex.yml
    secrets:
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_PREVIEW_DEPLOY_KEY }}
      CONVEX_URL: ${{ secrets.PREVIEW_DATA_CONVEX_URL }}
      NIOTEBOOK_INGEST_TOKEN: ${{ secrets.NIOTEBOOK_INGEST_TOKEN_PREVIEW_DATA }}
