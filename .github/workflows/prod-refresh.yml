name: prod refresh

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type YES to run prod refresh"
        required: true
        default: "NO"

jobs:
  # Gate job: fail loudly if confirmation is wrong instead of silently skipping.
  # This also avoids the if: + uses: pattern on the refresh job.
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "YES" ]; then
            echo "Production refresh requires confirm='YES' (case-sensitive)."
            echo "Got: '${{ github.event.inputs.confirm }}'"
            exit 1
          fi

  refresh:
    needs: gate
    uses: ./.github/workflows/_refresh-convex.yml
    with:
      allow_prod_ingest: true
      node_env: production
    secrets:
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_PROD_DEPLOY_KEY }}
      CONVEX_URL: ${{ secrets.PROD_CONVEX_URL }}
      NIOTEBOOK_INGEST_TOKEN: ${{ secrets.NIOTEBOOK_INGEST_TOKEN_PROD }}
