name: prod refresh

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type YES to run prod refresh"
        required: true
        default: "NO"

jobs:
  refresh:
    if: ${{ github.event.inputs.confirm == 'YES' }}
    uses: ./.github/workflows/_refresh-convex.yml
    with:
      allow_prod_ingest: true
      node_env: production
    secrets:
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_PROD_DEPLOY_KEY }}
      CONVEX_URL: ${{ secrets.PROD_CONVEX_URL }}
      NIOTEBOOK_INGEST_TOKEN: ${{ secrets.NIOTEBOOK_INGEST_TOKEN_PROD }}
