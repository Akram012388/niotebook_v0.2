name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_CONVEX_URL: ${{ secrets.DEV_CONVEX_URL }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.19"
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - name: Check formatting
        run: bun run format:check
      - run: bun run check:any
      - run: bun run check:unknown
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build
      - name: Report bundle sizes
        run: |
          echo "## Bundle sizes" >> $GITHUB_STEP_SUMMARY
          if [ -d ".next" ]; then
            du -sh .next/static/chunks/*.js 2>/dev/null | sort -hr | head -20 >> $GITHUB_STEP_SUMMARY || true
            echo "Total .next/static size: $(du -sh .next/static | cut -f1)" >> $GITHUB_STEP_SUMMARY
          fi
